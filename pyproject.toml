[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
# Regras razoáveis para um projeto pequeno: erros de sintaxe (E),
# pyflakes (F), imports (I), naming (N), bugs comuns (B), confortos (UP).
select = ["E", "F", "I", "N", "B", "UP"]
ignore = []

[tool.pytest.ini_options]
addopts = "-v --tb=short --cov=app --cov-report=term-missing --cov-report=xml"
testpaths = ["tests"]
